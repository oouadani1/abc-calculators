name: Rebuild dist/

# The dist/*.html files are generated by build.sh from source (shared/,
# each tool's index.html/calculator.css/calculator.js). GitHub Pages
# serves dist/*-embed.html directly, so a source edit that isn't followed
# by a manual `./build.sh` + commit leaves the live iframe stale. This
# workflow closes that gap: any push touching tool source rebuilds dist/
# and commits the result automatically.
on:
  push:
    branches: [main]
    paths:
      - "shared/**"
      - "mbta-fare-calculator/**"
      - "bluebikes-membership-calculator/**"
      - "build.sh"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dist/
        run: ./build.sh

      - name: Commit rebuilt dist/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          if git diff --cached --quiet; then
            echo "dist/ already up to date, nothing to commit."
          else
            git commit -m "Auto-rebuild dist/ from source changes"
            git push
          fi
